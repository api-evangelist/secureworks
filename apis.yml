  description: The Secureworks Taegis XDR API provides GraphQL-based programmatic access to the Taegis extended detection
    and response platform. The API supports alerts, investigations, endpoint assets, identities, threat intelligence, collectors,
    connectors, playbooks, and audit operations. Authentication uses OAuth2 client credentials flow with bearer token authorization.
    The platform is available across multiple regions in the US and EU, with each region served by a dedicated API endpoint.
