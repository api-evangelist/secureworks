description: Secureworks is a cybersecurity company that provides the Taegis XDR (Extended Detection and Response) platform,
  offering threat detection, investigation, and response capabilities backed by 20 years of security intelligence. Taegis
  ingests and correlates telemetry across endpoints, network, cloud, and identity sources to detect threats and automate response
  workflows. The Taegis XDR API exposes GraphQL APIs for alerts, investigations, endpoint assets, identities, threat intelligence,
  connectors, collectors, playbooks, and users, with OAuth2 client credentials authentication and multi-region deployment
  support.
