naftiko: "1.0.0-alpha1"

info:
  label: "Secureworks Taegis XDR API"
  description: "GraphQL API for the Taegis XDR platform covering alerts, investigations, endpoint assets, and threat intelligence."
  tags:
    - XDR
    - Threat Detection
    - Security Operations
    - Incident Response
    - Cybersecurity
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      TAEGIS_CLIENT_ID: TAEGIS_CLIENT_ID
      TAEGIS_CLIENT_SECRET: TAEGIS_CLIENT_SECRET

capability:
  consumes:
    - type: http
      namespace: taegis-xdr
      baseUri: https://api.ctpx.secureworks.com
      description: "Secureworks Taegis XDR GraphQL API"
      authentication:
        type: bearer
        token: "{{TAEGIS_ACCESS_TOKEN}}"
      resources:
        - name: graphql
          path: /graphql
          description: "Taegis XDR GraphQL endpoint"
          operations:
            - name: query-alerts
              method: POST
              description: "Query alerts from the Taegis XDR platform"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: query-investigations
              method: POST
              description: "Query investigations in the Taegis XDR platform"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: query-endpoint-assets
              method: POST
              description: "Query endpoint asset inventory"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: query-threat-intelligence
              method: POST
              description: "Query threat intelligence indicators"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: mutate-investigation
              method: POST
              description: "Create or update an investigation"
              body:
                type: json
                data:
                  query: "{{tools.mutation}}"
                  variables: "{{tools.variables}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: auth
          path: /auth/api/v2/auth/token
          description: "OAuth2 token endpoint"
          operations:
            - name: get-access-token
              method: POST
              description: "Obtain OAuth2 bearer token using client credentials"
              body:
                type: json
                data:
                  grant_type: "client_credentials"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: taegis-xdr-rest
      resources:
        - path: /v1/alerts
          name: alerts
          description: "Alert queries"
          operations:
            - method: POST
              name: query-alerts
              description: "Query XDR alerts"
              call: "taegis-xdr.query-alerts"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/investigations
          name: investigations
          description: "Investigation queries"
          operations:
            - method: POST
              name: query-investigations
              description: "Query XDR investigations"
              call: "taegis-xdr.query-investigations"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/assets
          name: endpoint-assets
          description: "Endpoint asset queries"
          operations:
            - method: POST
              name: query-endpoint-assets
              description: "Query endpoint assets"
              call: "taegis-xdr.query-endpoint-assets"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: taegis-xdr-mcp
      transport: http
      tools:
        - name: query-alerts
          description: "Query security alerts from the Taegis XDR platform"
          hints:
            readOnly: true
            openWorld: false
          call: "taegis-xdr.query-alerts"
          outputParameters:
            - type: object
              mapping: "$."

        - name: query-investigations
          description: "Query security investigations in Taegis XDR"
          hints:
            readOnly: true
            openWorld: false
          call: "taegis-xdr.query-investigations"
          outputParameters:
            - type: object
              mapping: "$."

        - name: query-endpoint-assets
          description: "Query endpoint asset inventory including hosts, agents, and isolation status"
          hints:
            readOnly: true
            openWorld: false
          call: "taegis-xdr.query-endpoint-assets"
          outputParameters:
            - type: object
              mapping: "$."

        - name: query-threat-intelligence
          description: "Query threat intelligence indicators including IPs, domains, and file hashes"
          hints:
            readOnly: true
            openWorld: false
          call: "taegis-xdr.query-threat-intelligence"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-investigation
          description: "Create a new security investigation in Taegis XDR"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "taegis-xdr.mutate-investigation"
          outputParameters:
            - type: object
              mapping: "$."
